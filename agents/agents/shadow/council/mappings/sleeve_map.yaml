# =============================================================================
# LEAF COUNCIL (Specialist Photons) - Deploy As Needed
# =============================================================================

# Additional 20 photons at leaf level
# These are domain specialists for specific contexts
# Map as services are requested

# =============================================================================
# GLUING CONDITIONS
# =============================================================================

gluing_rules:
  high_compatibility:
    - [C1a1, C4b2]  # Creativity + Risk = Risk-quantified innovation
    - [C5b1, C2b2]  # Translation + Synthesis = Culturally-aware synthesis
    - [C3a1, C4a1]  # Memory + Scenarios = Historical scenario planning
    - [C2b1, C5a1]  # Logic + Emotion = Emotionally-informed logic

  medium_compatibility:
    - [C1a1, C3a1]  # Creativity + Memory = Innovation with context
    - [C4b2, C5b1]  # Risk + Translation = Cross-cultural risk assessment
    - [C2b2, C3a2]  # Synthesis + History = Historically-informed synthesis

  council_formations:
    creative_risk:
      photons: [C1a1, C4b2, C2b2]
      purpose: "Generate creative ideas with risk assessment"
    memory_council:
      photons: [C3a1, C3a2, C3b1]
      purpose: "Deep historical and contextual analysis"
    bridge_council:
      photons: [C5b1, C5a1, C5a2]
      purpose: "Social and cultural translation"

# =============================================================================
# DISPATCH THRESHOLDS
# =============================================================================

dispatch_rules:
  auto_dispatch:
    - trigger: "mention of security"
      sleeve: C1b1
      confidence: 0.7
    - trigger: "mention of risk"
      sleeve: C4b2
      confidence: 0.8
    - trigger: "mention of history"
      sleeve: C3a2
      confidence: 0.7

  requires_planning_mode:
    - trigger: "financial transaction"
      reason: "Economic boundary"
    - trigger: "controversial post"
      reason: "Reputation risk"
    - trigger: "novel situation"
      reason: "Unknown territory"

  scar_gates:
    max_posts_per_day: 5
    max_comments_per_day: 40
    comment_interval_ms: 60000
    post_interval_ms: 1800000
